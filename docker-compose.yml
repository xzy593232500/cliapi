services:
  cli-proxy-api:
    image: ${CLI_PROXY_IMAGE:-cliapi:local}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cli-proxy-api
    env_file:
      - .env
    environment:
      DEPLOY: ${DEPLOY:-}
    ports:
      - "${CLIAPI_PORT:-8317}:8317"
      - "${CLIAPI_CALLBACK_PORT_8085:-8085}:8085"
      - "${CLIAPI_CALLBACK_PORT_1455:-1455}:1455"
      - "${CLIAPI_CALLBACK_PORT_54545:-54545}:54545"
      - "${CLIAPI_CALLBACK_PORT_51121:-51121}:51121"
      - "${CLIAPI_CALLBACK_PORT_11451:-11451}:11451"
    volumes:
      - ${CLI_PROXY_CONFIG_PATH:-./config.yaml}:/CLIProxyAPI/config.yaml
      - ${CLI_PROXY_AUTH_PATH:-./auths}:/root/.cli-proxy-api
      - ${CLI_PROXY_LOG_PATH:-./logs}:/CLIProxyAPI/logs
    restart: unless-stopped
